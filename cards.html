<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>커스텀 카드 | 산업재산권법 조문연습</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F9FAFB; --bg-card: #FFFFFF; --text: #191F28; --text-sub: #4E5968;
    --text-mute: #8B95A1; --border: #F2F4F6; --border-strong: #E5E8EB;
    --brand: #3182F6; --brand-sub: #E8F3FF; --brand-hover: #1B64DA;
    --accent: #FFF3CD; --accent-strong: #F4A100;
    --success: #00C471; --success-sub: #E6F9F0;
    --danger: #F04452; --danger-sub: #FFEBED;
    --radius: 14px; --radius-lg: 20px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; -webkit-font-smoothing: antialiased; letter-spacing: -0.01em; }

  nav { position: sticky; top: 0; background: rgba(249,250,251,0.85); backdrop-filter: saturate(180%) blur(12px); z-index: 100; border-bottom: 1px solid var(--border); }
  .nav-inner { display: flex; align-items: center; justify-content: space-between; height: 64px; max-width: 1280px; margin: 0 auto; padding: 0 24px; }
  .logo { font-size: 18px; font-weight: 800; color: var(--text); text-decoration: none; letter-spacing: -0.03em; }
  .nav-links { display: flex; gap: 28px; align-items: center; }
  .nav-links a { color: var(--text-sub); text-decoration: none; font-size: 15px; font-weight: 500; transition: color 0.15s; }
  .nav-links a:hover, .nav-links a.active { color: var(--text); }

  .layout { display: grid; grid-template-columns: 280px 1fr; max-width: 1280px; margin: 0 auto; min-height: calc(100vh - 64px); }

  aside { border-right: 1px solid var(--border); padding: 16px 0; position: sticky; top: 64px; height: calc(100vh - 64px); overflow-y: auto; display: flex; flex-direction: column; }
  .quick-add-wrap { padding: 0 16px 12px; display: flex; gap: 6px; }
  .quick-add-input { flex: 1; padding: 10px 14px; border: 1.5px solid var(--brand); border-radius: 10px; font-size: 14px; font-family: inherit; background: var(--brand-sub); color: var(--text); outline: none; transition: border-color 0.15s; }
  .quick-add-input::placeholder { color: var(--brand); opacity: 0.6; }
  .quick-add-input:focus { border-color: var(--brand-hover); background: white; }
  .quick-add-btn { padding: 10px 14px; background: var(--brand); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; flex-shrink: 0; transition: background 0.15s; }
  .quick-add-btn:hover { background: var(--brand-hover); }

  .cat-tabs { display: flex; gap: 4px; padding: 0 16px 12px; border-bottom: 1px solid var(--border); }
  .cat-tab { flex: 1; padding: 7px 4px; font-size: 12px; font-weight: 600; background: transparent; border: none; color: var(--text-mute); cursor: pointer; border-radius: 7px; transition: all 0.15s; font-family: inherit; }
  .cat-tab.active { background: var(--text); color: white; }
  .cat-tab:not(.active):hover { background: var(--border); color: var(--text); }

  .sidebar-search { padding: 12px 16px 8px; }
  .sidebar-search input { width: 100%; padding: 9px 12px; border: 1px solid var(--border-strong); border-radius: 9px; font-size: 13px; font-family: inherit; background: var(--bg-card); color: var(--text); outline: none; transition: border-color 0.15s; }
  .sidebar-search input:focus { border-color: var(--brand); }

  .card-list { padding: 4px 8px; list-style: none; flex: 1; overflow-y: auto; }
  .card-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 14px; transition: background 0.1s; display: flex; align-items: center; gap: 6px; }
  .card-item:hover { background: var(--border); }
  .card-item.active { background: var(--brand-sub); color: var(--brand); font-weight: 600; }
  .card-item-title { flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .cat-badge { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; background: var(--border); color: var(--text-mute); flex-shrink: 0; }
  .card-item.active .cat-badge { background: rgba(49,130,246,0.15); color: var(--brand); }
  .has-blanks { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-strong); flex-shrink: 0; }
  .empty-list { padding: 24px 12px; font-size: 13px; color: var(--text-mute); text-align: center; line-height: 1.8; }

  /* 카드 유형 배지 */
  .type-badge { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; display: inline-block; flex-shrink: 0; }
  .type-ox { background: #FFF0E0; color: #D4620A; }
  .type-subj { background: #F0E8FF; color: #7B4FBD; }
  .type-table { background: #E0F5EE; color: #1A8C6F; }
  .type-badge-lg { font-size: 12px; padding: 3px 10px; border-radius: 6px; margin-left: 8px; vertical-align: middle; }

  main { padding: 32px 40px; min-width: 0; }

  .login-prompt { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; text-align: center; gap: 16px; }
  .login-prompt h3 { font-size: 22px; font-weight: 800; }
  .login-prompt p { font-size: 15px; color: var(--text-sub); }
  .login-prompt a { display: inline-block; padding: 12px 28px; background: var(--brand); color: white; text-decoration: none; border-radius: 10px; font-weight: 700; font-size: 15px; transition: background 0.15s; }
  .login-prompt a:hover { background: var(--brand-hover); }

  .empty-state { padding: 80px 40px; text-align: center; color: var(--text-mute); }
  .empty-state h3 { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
  .empty-state p { font-size: 15px; line-height: 1.7; }

  /* 생성 폼 */
  .create-form-wrap { max-width: 680px; }
  .create-form-wrap h2 { font-size: 26px; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 28px; }
  .form-group { margin-bottom: 20px; }
  .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text-sub); margin-bottom: 8px; }
  .form-input { width: 100%; padding: 12px 14px; border: 1px solid var(--border-strong); border-radius: 10px; font-size: 15px; font-family: inherit; background: var(--bg-card); color: var(--text); outline: none; transition: border-color 0.15s; }
  .form-input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(49,130,246,0.1); }
  .form-select { width: auto; padding: 10px 14px; border: 1px solid var(--border-strong); border-radius: 10px; font-size: 14px; font-family: inherit; background: var(--bg-card); color: var(--text); outline: none; cursor: pointer; }
  .form-select:focus { border-color: var(--brand); }
  .form-textarea { width: 100%; min-height: 200px; padding: 14px 16px; border: 1px solid var(--border-strong); border-radius: 10px; font-size: 17px; font-family: 'Gowun Batang', serif; background: var(--bg-card); color: var(--text); outline: none; resize: vertical; line-height: 2; transition: border-color 0.15s; }
  .form-textarea:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(49,130,246,0.1); }
  .form-textarea::placeholder { color: var(--text-mute); font-family: 'Pretendard', sans-serif; font-size: 14px; line-height: 1.7; }
  .form-hint { margin-top: 6px; font-size: 12px; color: var(--text-mute); }
  .form-actions { display: flex; gap: 10px; margin-top: 8px; }

  /* 카드 유형 선택기 */
  .type-selector { display: flex; gap: 6px; flex-wrap: wrap; }
  .type-btn { padding: 8px 16px; font-size: 13px; font-weight: 600; background: var(--bg); border: 1.5px solid var(--border-strong); border-radius: 8px; cursor: pointer; color: var(--text-sub); font-family: inherit; transition: all 0.15s; }
  .type-btn:hover { border-color: var(--text-mute); color: var(--text); }
  .type-btn.active { background: var(--brand); color: white; border-color: var(--brand); }

  /* O/X 정답 선택기 (폼) */
  .ox-answer-select { display: flex; gap: 12px; }
  .ox-pick { padding: 12px 32px; font-size: 16px; font-weight: 700; background: var(--bg); border: 2px solid var(--border-strong); border-radius: 10px; cursor: pointer; color: var(--text-sub); font-family: inherit; transition: all 0.15s; }
  .ox-pick:hover { border-color: var(--text-mute); }
  .ox-pick.active[data-val="O"] { background: var(--success-sub); color: var(--success); border-color: var(--success); }
  .ox-pick.active[data-val="X"] { background: var(--danger-sub); color: var(--danger); border-color: var(--danger); }

  /* 카드 뷰어 공통 */
  .content-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; flex-wrap: wrap; gap: 16px; }
  .card-category-label { font-size: 13px; font-weight: 700; padding: 3px 10px; border-radius: 6px; background: var(--brand-sub); color: var(--brand); display: inline-block; margin-bottom: 8px; }
  .card-title-main { font-size: 32px; font-weight: 800; letter-spacing: -0.03em; line-height: 1.2; }
  .header-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .mode-toggle { display: inline-flex; background: var(--border); padding: 3px; border-radius: 10px; gap: 2px; }
  .mode-btn { padding: 8px 16px; font-size: 13px; font-weight: 600; background: transparent; border: none; border-radius: 8px; cursor: pointer; color: var(--text-sub); font-family: inherit; transition: all 0.15s; }
  .mode-btn.active { background: white; color: var(--text); box-shadow: 0 1px 2px rgba(0,0,0,0.06); }
  .mode-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .stats-bar { display: flex; gap: 16px; padding: 16px 20px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 20px; }
  .stat-item { display: flex; flex-direction: column; gap: 2px; flex: 1; }
  .stat-label { font-size: 12px; color: var(--text-mute); font-weight: 500; }
  .stat-value { font-size: 20px; font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; }
  .stat-value.accent { color: var(--accent-strong); }
  .stat-value.brand { color: var(--brand); }
  .toolbar { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .toolbar-hint { font-size: 14px; color: var(--text-sub); display: flex; align-items: center; gap: 8px; }
  .hint-icon { width: 20px; height: 20px; border-radius: 50%; background: var(--brand-sub); color: var(--brand); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
  .toolbar-actions { display: flex; gap: 8px; }
  .tool-btn { padding: 8px 14px; font-size: 13px; font-weight: 600; background: white; border: 1px solid var(--border-strong); border-radius: 8px; cursor: pointer; color: var(--text); font-family: inherit; display: inline-flex; align-items: center; gap: 6px; transition: all 0.15s; }
  .tool-btn:hover:not(:disabled) { border-color: var(--text-mute); }
  .tool-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .tool-btn.primary { background: var(--brand); color: white; border-color: var(--brand); }
  .tool-btn.primary:hover:not(:disabled) { background: var(--brand-hover); border-color: var(--brand-hover); }
  .tool-btn.danger:hover:not(:disabled) { color: var(--danger); border-color: var(--danger); }
  .article-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 48px 56px; margin-bottom: 24px; }
  .article-body { font-family: 'Gowun Batang', serif; font-size: 19px; line-height: 2.2; color: var(--text); white-space: pre-wrap; user-select: text; -webkit-user-select: text; }
  .article-body.study-mode { cursor: default; }
  .blank-span { background: var(--accent); border-bottom: 2px solid var(--accent-strong); padding: 1px 4px; border-radius: 4px 4px 0 0; font-family: 'Gowun Batang', serif; cursor: pointer; transition: background 0.15s; }
  .blank-span:hover { background: #FFE899; }
  .blank-span.in-study { background: var(--brand-sub); border-bottom: 2px solid var(--brand); color: transparent; -webkit-user-select: none; user-select: none; min-width: 40px; display: inline-block; text-align: center; }
  .blank-span.in-study:hover { background: #DCE9FB; }
  .blank-span.in-study.revealed { background: var(--success-sub); border-bottom: 2px solid var(--success); color: var(--text); font-family: 'Gowun Batang', serif; }
  .blank-span.in-study::before { content: attr(data-hint); color: var(--brand); font-family: 'Pretendard', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0.5px; }
  .blank-span.in-study.revealed::before { display: none; }

  /* 구조화 카드 공통 (edit mode 미리보기) */
  .structured-preview { display: flex; flex-direction: column; gap: 28px; }
  .preview-label { font-size: 11px; font-weight: 700; color: var(--text-mute); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; }
  .preview-content { font-family: 'Gowun Batang', serif; font-size: 19px; line-height: 2; color: var(--text); white-space: pre-wrap; }
  .answer-badge { display: inline-block; padding: 6px 24px; border-radius: 8px; font-size: 20px; font-weight: 800; font-family: 'Pretendard', sans-serif; }
  .answer-o { background: var(--success-sub); color: var(--success); }
  .answer-x { background: var(--danger-sub); color: var(--danger); }

  /* 퀴즈 인터페이스 (O/X, 주관식 study mode) */
  .quiz-interface { display: flex; flex-direction: column; align-items: center; gap: 36px; padding: 8px 0; }
  .quiz-question { font-family: 'Gowun Batang', serif; font-size: 20px; line-height: 2; color: var(--text); white-space: pre-wrap; text-align: center; width: 100%; }

  /* O/X 버튼 */
  .ox-buttons { display: flex; gap: 28px; }
  .ox-btn { width: 110px; height: 110px; border-radius: 50%; font-size: 42px; font-weight: 900; border: 3px solid transparent; cursor: pointer; font-family: 'Pretendard', sans-serif; transition: all 0.15s; display: flex; align-items: center; justify-content: center; }
  .ox-o { background: var(--success-sub); color: var(--success); border-color: var(--success); }
  .ox-o:hover:not(:disabled) { background: var(--success); color: white; transform: scale(1.06); }
  .ox-x { background: var(--danger-sub); color: var(--danger); border-color: var(--danger); }
  .ox-x:hover:not(:disabled) { background: var(--danger); color: white; transform: scale(1.06); }
  .ox-btn:disabled { cursor: not-allowed; transform: none !important; }
  .btn-correct { background: var(--success) !important; color: white !important; border-color: var(--success) !important; }
  .btn-wrong { opacity: 0.25 !important; }

  /* 결과 */
  .quiz-result { width: 100%; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .result-badge { display: inline-block; padding: 10px 32px; border-radius: 10px; font-size: 18px; font-weight: 800; font-family: 'Pretendard', sans-serif; }
  .result-correct { background: var(--success-sub); color: var(--success); }
  .result-wrong { background: var(--danger-sub); color: var(--danger); }
  .result-explanation { font-size: 15px; color: var(--text-sub); line-height: 1.8; text-align: left; white-space: pre-wrap; background: var(--bg); border-radius: 10px; padding: 16px 20px; width: 100%; border-left: 3px solid var(--border-strong); }

  /* 주관식 */
  .subj-input-wrap { width: 100%; display: flex; flex-direction: column; gap: 12px; }
  .subj-input { width: 100%; min-height: 160px; padding: 14px 16px; border: 1.5px solid var(--border-strong); border-radius: 10px; font-size: 17px; font-family: 'Gowun Batang', serif; background: var(--bg-card); color: var(--text); outline: none; resize: vertical; line-height: 1.9; transition: border-color 0.15s; }
  .subj-input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(49,130,246,0.1); }
  .subj-answer-reveal { width: 100%; }
  .subj-model-answer { font-family: 'Gowun Batang', serif; font-size: 18px; line-height: 2; color: var(--text); white-space: pre-wrap; background: var(--success-sub); border-radius: 10px; padding: 20px 24px; border-left: 4px solid var(--success); }

  /* 표 카드 (뷰어/암기 모드) */
  .study-table { border-collapse: collapse; width: 100%; font-family: 'Gowun Batang', serif; font-size: 17px; line-height: 1.7; }
  .study-table th, .study-table td { border: 1px solid var(--border-strong); padding: 12px 16px; vertical-align: middle; }
  .study-table th { background: var(--border); font-weight: 700; text-align: center; font-family: 'Pretendard', sans-serif; font-size: 14px; }
  .cell-blanked { background: var(--accent) !important; border-bottom: 2px solid var(--accent-strong) !important; cursor: pointer; }
  .cell-blanked:hover { background: #FFE899 !important; }
  .cell-hidden { background: var(--brand-sub) !important; color: transparent !important; cursor: pointer; min-width: 60px; text-align: center; }
  .cell-hidden:hover { background: #DCE9FB !important; }
  .cell-revealed { background: var(--success-sub) !important; color: var(--text) !important; }

  /* 표 에디터 (생성 폼) */
  .table-editor-toolbar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; align-items: center; }
  .te-btn { padding: 6px 12px; font-size: 12px; font-weight: 600; background: var(--bg); border: 1px solid var(--border-strong); border-radius: 7px; cursor: pointer; color: var(--text-sub); font-family: inherit; transition: all 0.15s; white-space: nowrap; }
  .te-btn:hover:not(:disabled) { border-color: var(--text-mute); color: var(--text); }
  .te-btn:disabled { opacity: 0.38; cursor: not-allowed; }
  .te-btn.te-merge-on { background: var(--brand); color: white; border-color: var(--brand); }
  .te-sep { width: 1px; height: 20px; background: var(--border-strong); flex-shrink: 0; }
  .table-editor-wrap { overflow-x: auto; border: 1px solid var(--border-strong); border-radius: 10px; background: var(--bg-card); }
  .table-editor-grid table { border-collapse: collapse; min-width: 100%; }
  .table-editor-grid th, .table-editor-grid td { border: 1px solid var(--border-strong); padding: 0; min-width: 100px; vertical-align: top; position: relative; }
  .table-editor-grid th { background: var(--border); }
  .te-cell-sel { outline: 2px solid var(--brand) !important; outline-offset: -2px; background: var(--brand-sub) !important; }
  .table-editor-grid th.te-cell-sel { background: #D0E8FF !important; }
  .te-input { display: block; width: 100%; padding: 9px 11px; border: none; font-size: 14px; font-family: 'Gowun Batang', serif; background: transparent; color: var(--text); outline: none; resize: none; overflow: hidden; min-height: 42px; line-height: 1.6; }
  .table-editor-grid th .te-input { font-weight: 700; font-family: 'Pretendard', sans-serif; }
  .te-merge-label { position: absolute; top: 3px; right: 3px; font-size: 9px; font-weight: 700; background: var(--brand); color: white; padding: 1px 5px; border-radius: 3px; font-family: 'Pretendard'; pointer-events: none; line-height: 1.6; }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--text); color: white; padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 500; z-index: 1000; transition: transform 0.3s cubic-bezier(0.22,1,0.36,1); box-shadow: 0 4px 24px rgba(0,0,0,0.15); }
  .toast.show { transform: translateX(-50%) translateY(0); }

  aside::-webkit-scrollbar { width: 4px; }
  aside::-webkit-scrollbar-track { background: transparent; }
  aside::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="logo">산업재산권법 조문연습</a>
    <div class="nav-links">
      <a href="study.html">조문 암기</a>
      <a href="cards.html" class="active">커스텀 카드</a>
      <span class="nav-auth"><a href="login.html">로그인</a></span>
    </div>
  </div>
</nav>

<div class="layout">
  <aside id="sidebar">
    <div class="quick-add-wrap">
      <input class="quick-add-input" id="quickAddInput" placeholder="제목 입력 후 Enter 또는 + 클릭" type="text">
      <button class="quick-add-btn" id="quickAddBtn" title="카드 추가">+</button>
    </div>
    <div class="cat-tabs">
      <button class="cat-tab active" data-cat="전체">전체</button>
      <button class="cat-tab" data-cat="판례">판례</button>
      <button class="cat-tab" data-cat="학설">학설</button>
      <button class="cat-tab" data-cat="기타">기타</button>
    </div>
    <div class="sidebar-search">
      <input type="text" id="searchInput" placeholder="카드 검색">
    </div>
    <ul class="card-list" id="cardList">
      <li class="empty-list">불러오는 중...</li>
    </ul>
  </aside>

  <main id="mainArea">
    <div class="empty-state">
      <h3>커스텀 암기카드</h3>
      <p>판례, 학설 등 직접 내용을 입력하고<br>다양한 형식으로 암기하세요.</p>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { auth, blanks as blanksAPI, customCards as cardsAPI, profile as profileAPI, renderAuthNav } from './supabase-client.js';

  renderAuthNav();

  const FREE_CARD_LIMIT = 3;

  const state = {
    cards: [],
    currentCardId: null,
    mode: 'edit',
    blanks: {},
    isLoggedIn: false,
    isPremium: false,
    filter: '전체',
  };

  let currentCreateType = 'fill-blank';
  let currentCardData = null; // OX/주관식 파싱된 데이터

  const searchInput = document.getElementById('searchInput');

  // 초기화
  try {
    const user = await auth.getUser();
    state.isLoggedIn = !!user;

    if (!user) {
      document.getElementById('mainArea').innerHTML = `
        <div class="login-prompt">
          <h3>로그인이 필요합니다</h3>
          <p>커스텀 카드를 만들고 암기 데이터를 저장하려면 로그인하세요.</p>
          <a href="login.html">로그인하기 →</a>
        </div>
      `;
      document.getElementById('cardList').innerHTML = '<li class="empty-list">로그인 후 이용하세요</li>';
      document.getElementById('quickAddInput').disabled = true;
    } else {
      [state.blanks, state.cards, state.isPremium] = await Promise.all([
        blanksAPI.getAll(),
        cardsAPI ? cardsAPI.getAll() : Promise.resolve([]),
        profileAPI ? profileAPI.isPremium().catch(() => false) : Promise.resolve(false),
      ]);
      renderCardList();
    }
  } catch(e) {
    console.error('cards.html 초기화 오류:', e);
    document.getElementById('cardList').innerHTML =
      `<li class="empty-list" style="color:var(--danger)">오류: ${e.message}<br><small style="color:var(--text-mute)">Ctrl+Shift+R 로 새로고침해주세요</small></li>`;
  }

  // 탭 필터
  document.querySelectorAll('.cat-tab').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.filter = btn.dataset.cat;
      renderCardList();
    };
  });

  // 검색
  let searchTimer;
  searchInput.oninput = () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => renderCardList(), 120);
  };

  // 퀵 추가
  function triggerQuickAdd() {
    const input = document.getElementById('quickAddInput');
    const title = input.value.trim();
    if (!title) { input.focus(); return; }
    showCreateForm(title);
    input.value = '';
  }
  document.getElementById('quickAddInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); triggerQuickAdd(); }
  });
  document.getElementById('quickAddBtn').addEventListener('click', triggerQuickAdd);

  // === 사이드바 렌더링 ===
  function getCardSearchText(c) {
    const ct = c.card_type || 'fill-blank';
    if (ct === 'ox' || ct === 'subjective') {
      try {
        const d = JSON.parse(c.body);
        return [d.q, d.a, d.e].filter(Boolean).join(' ');
      } catch { return c.body; }
    }
    return c.body;
  }

  function getTypeBadgeHtml(cardType) {
    if (cardType === 'ox') return '<span class="type-badge type-ox">OX</span>';
    if (cardType === 'subjective') return '<span class="type-badge type-subj">주관</span>';
    if (cardType === 'table') return '<span class="type-badge type-table">표</span>';
    return '';
  }

  function renderCardList() {
    const list = document.getElementById('cardList');
    const kw = searchInput.value.trim().toLowerCase();
    let cards = state.cards;
    if (state.filter !== '전체') cards = cards.filter(c => c.category === state.filter);
    if (kw) cards = cards.filter(c => {
      const searchable = c.title + ' ' + getCardSearchText(c);
      return searchable.toLowerCase().includes(kw);
    });

    if (!cards.length) {
      list.innerHTML = `<li class="empty-list">${state.cards.length === 0 ? '아직 카드가 없습니다.<br>위 입력창에서 카드를 추가하세요.' : '검색 결과 없음'}</li>`;
      return;
    }

    list.innerHTML = cards.map(c => {
      const blankKey = 'custom-' + c.id;
      const ct = c.card_type || 'fill-blank';
      const hasBlanks = (ct === 'fill-blank' || ct === 'table') && state.blanks[blankKey]?.length > 0;
      const isActive = c.id === state.currentCardId;
      return `
        <li class="card-item ${isActive ? 'active' : ''}" data-id="${c.id}">
          <span class="card-item-title">${escapeHtml(c.title)}</span>
          ${getTypeBadgeHtml(ct)}
          <span class="cat-badge">${escapeHtml(c.category)}</span>
          ${hasBlanks ? '<span class="has-blanks" title="빈칸 저장됨"></span>' : ''}
        </li>
      `;
    }).join('');

    list.querySelectorAll('.card-item[data-id]').forEach(el => {
      el.onclick = () => selectCard(el.dataset.id);
    });
  }

  // === 카드 선택 ===
  function selectCard(id) {
    state.currentCardId = id;
    state.mode = 'edit';
    renderCardList();
    renderMain();
  }

  // === 생성 폼 ===
  function showCreateForm(prefillTitle = '') {
    state.currentCardId = null;
    state.mode = 'create';
    currentCreateType = 'fill-blank';
    tblData = null; // 표 에디터 초기화
    renderCardList();

    document.getElementById('mainArea').innerHTML = `
      <div class="create-form-wrap">
        <h2>새 카드 만들기</h2>
        <div id="createError" style="display:none;padding:12px 14px;background:var(--danger-sub);color:#B01826;border-radius:9px;font-size:14px;margin-bottom:16px;border:1px solid rgba(240,68,82,0.15);"></div>

        <div class="form-group">
          <label class="form-label">카드 유형</label>
          <div class="type-selector" id="typeSelector">
            <button type="button" class="type-btn active" data-type="fill-blank">빈칸 채우기</button>

        </div>

        <div class="form-group">

        </div>
        <div class="form-group">
          <label class="form-label">카테고리</label>
          <select class="form-select" id="newCategory">
            <option value="판례">판례</option>
            <option value="학설">학설</option>
            <option value="기타" selected>기타</option>
          </select>
        </div>

        <!-- 빈칸 채우기 필드 -->
        <div id="fillBlankFields">
          <div class="form-group">
            <label class="form-label">내용</label>
            <textarea class="form-textarea" id="newBody" placeholder="암기할 내용을 입력하세요. 저장 후 드래그로 빈칸을 만들 수 있습니다."></textarea>
            <div class="form-hint">판례 요지, 학설 내용 등 자유롭게 입력하세요.</div>
          </div>
        </div>

        <!-- 표 필드 -->
        <div id="tableFields" style="display:none">
          <div class="form-group">
            <label class="form-label">표 편집</label>
            <div class="table-editor-toolbar">
              <button type="button" class="te-btn" id="tblAddRowBtn">+ 행</button>
              <button type="button" class="te-btn" id="tblRemRowBtn">− 행</button>
              <div class="te-sep"></div>
              <button type="button" class="te-btn" id="tblAddColBtn">+ 열</button>
              <button type="button" class="te-btn" id="tblRemColBtn">− 열</button>
              <div class="te-sep"></div>
              <button type="button" class="te-btn" id="tblMergeBtn" disabled>셀 합치기</button>
              <button type="button" class="te-btn" id="tblSplitBtn" disabled>셀 나누기</button>
            </div>
            <div class="table-editor-wrap">
              <div class="table-editor-grid" id="tableEditorGrid"></div>
            </div>
            <div class="form-hint">첫 번째 행이 헤더입니다. 셀을 클릭하거나 Shift+클릭으로 범위 선택 후 합치기 가능합니다.</div>
          </div>
        </div>

        <!-- O/X 필드 -->
        <div id="oxFields" style="display:none">
          <div class="form-group">
            <label class="form-label">문제</label>
            <textarea class="form-textarea" id="oxQuestion" placeholder="O 또는 X로 판단할 진술을 입력하세요." style="min-height:140px"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">정답</label>
            <div class="ox-answer-select" id="oxAnswerSelect">
              <button type="button" class="ox-pick active" data-val="O">O (옳음)</button>
              <button type="button" class="ox-pick" data-val="X">X (틀림)</button>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">해설 <span style="font-weight:400;color:var(--text-mute)">(선택)</span></label>
            <textarea class="form-textarea" id="oxExplanation" placeholder="정답 해설을 입력하세요. (선택 사항)" style="min-height:100px"></textarea>
          </div>
        </div>

        <!-- 주관식 필드 -->
        <div id="subjectiveFields" style="display:none">
          <div class="form-group">
            <label class="form-label">문제</label>
            <textarea class="form-textarea" id="subjQuestion" placeholder="주관식 문제를 입력하세요." style="min-height:140px"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">모범 답안</label>
            <textarea class="form-textarea" id="subjAnswerInput" placeholder="모범 답안을 입력하세요." style="min-height:140px"></textarea>
          </div>
        </div>

        <div class="form-actions">
          <button class="tool-btn primary" id="saveCardBtn">저장하기 →</button>
          <button class="tool-btn" id="cancelCardBtn">취소</button>
        </div>
      </div>
    `;

    // 유형 선택
    document.querySelectorAll('#typeSelector .type-btn').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('#typeSelector .type-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentCreateType = btn.dataset.type;
        updateCreateFormFields();
      };
    });

    // O/X 정답 선택
    document.querySelectorAll('#oxAnswerSelect .ox-pick').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('#oxAnswerSelect .ox-pick').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      };
    });

    const titleEl = document.getElementById('newTitle');
    titleEl.focus();
    titleEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const first = document.getElementById('newBody') || document.getElementById('oxQuestion') || document.getElementById('subjQuestion');
        if (first) first.focus();
      }
    });
    document.getElementById('saveCardBtn').addEventListener('click', saveNewCard);
    document.getElementById('cancelCardBtn').addEventListener('click', cancelCreate);
  }

  function updateCreateFormFields() {
    document.getElementById('fillBlankFields').style.display = currentCreateType === 'fill-blank' ? '' : 'none';
    document.getElementById('tableFields').style.display = currentCreateType === 'table' ? '' : 'none';
    document.getElementById('oxFields').style.display = currentCreateType === 'ox' ? '' : 'none';
    document.getElementById('subjectiveFields').style.display = currentCreateType === 'subjective' ? '' : 'none';
    if (currentCreateType === 'table') initTableEditor();
  }

  async function saveNewCard() {
    const titleEl = document.getElementById('newTitle');
    const categoryEl = document.getElementById('newCategory');
    const saveBtn = document.getElementById('saveCardBtn');

    const title = titleEl?.value.trim() || '';
    const category = categoryEl?.value || '기타';
    let body = '';

    // 유형별 body 조합
    if (currentCreateType === 'fill-blank') {
      body = document.getElementById('newBody')?.value.trim() || '';
      if (!body) { showCreateError('내용을 입력해주세요.'); document.getElementById('newBody')?.focus(); return; }
    } else if (currentCreateType === 'table') {
      if (!tblData || !tblData.rows.length) { showCreateError('표 내용을 입력해주세요.'); return; }
      const hasContent = tblData.rows.some(row => row.some(c => c && c.t.trim()));
      if (!hasContent) { showCreateError('표에 내용을 입력해주세요.'); return; }
      body = JSON.stringify(tblData);
    } else if (currentCreateType === 'ox') {
      const q = document.getElementById('oxQuestion')?.value.trim() || '';
      const a = document.querySelector('#oxAnswerSelect .ox-pick.active')?.dataset.val || 'O';
      const e = document.getElementById('oxExplanation')?.value.trim() || '';
      if (!q) { showCreateError('문제를 입력해주세요.'); document.getElementById('oxQuestion')?.focus(); return; }
      body = JSON.stringify({ q, a, e });
    } else if (currentCreateType === 'subjective') {
      const q = document.getElementById('subjQuestion')?.value.trim() || '';
      const a = document.getElementById('subjAnswerInput')?.value.trim() || '';
      if (!q) { showCreateError('문제를 입력해주세요.'); document.getElementById('subjQuestion')?.focus(); return; }
      if (!a) { showCreateError('모범 답안을 입력해주세요.'); document.getElementById('subjAnswerInput')?.focus(); return; }
      body = JSON.stringify({ q, a });
    }

    if (!title) { showCreateError('제목을 입력해주세요.'); titleEl?.focus(); return; }

    if (!state.isPremium && state.cards.length >= FREE_CARD_LIMIT) {
      const errorEl = document.getElementById('createError');
      errorEl.innerHTML = `무료 플랜은 최대 ${FREE_CARD_LIMIT}개 카드까지 만들 수 있습니다.<br>프리미엄으로 업그레이드하면 무제한으로 이용할 수 있어요. (<a href="account.html" style="color:var(--brand)">마이페이지 →</a>)`;
      errorEl.style.display = 'block';
      return;
    }

    saveBtn.disabled = true;
    saveBtn.textContent = '저장 중...';

    const { data, error } = await cardsAPI.create(title, body, category, currentCreateType);
    if (error || !data) {
      showCreateError('저장 실패: ' + (error?.message || '알 수 없는 오류'));
      saveBtn.disabled = false;
      saveBtn.textContent = '저장하기 →';
      return;
    }

    state.cards.unshift(data);
    state.currentCardId = data.id;
    state.mode = 'edit';
    renderCardList();
    renderMain();
    toast(`"${title}" 카드가 추가되었습니다`);
  }

  function showCreateError(msg) {
    const errorEl = document.getElementById('createError');
    if (errorEl) { errorEl.textContent = msg; errorEl.style.display = 'block'; }
  }

  function cancelCreate() {
    state.mode = 'edit';
    state.currentCardId = null;
    renderCardList();
    document.getElementById('mainArea').innerHTML = `
      <div class="empty-state"><h3>카드를 선택하세요</h3><p>왼쪽에서 카드를 선택하거나 새 카드를 추가하세요.</p></div>
    `;
  }

  // === 메인 렌더링 (유형 분기) ===
  function renderMain() {
    const area = document.getElementById('mainArea');
    const card = findCard(state.currentCardId);
    if (!card) {
      area.innerHTML = `<div class="empty-state"><h3>카드를 선택하세요</h3><p>왼쪽에서 카드를 선택하거나 새 카드를 추가하세요.</p></div>`;
      return;
    }
    const ct = card.card_type || 'fill-blank';
    if (ct === 'ox') renderOXCard(card);
    else if (ct === 'subjective') renderSubjectiveCard(card);
    else if (ct === 'table') renderTableCard(card);
    else renderFillBlankCard(card);
  }

  // === 빈칸 채우기 카드 ===
  function renderFillBlankCard(card) {
    const area = document.getElementById('mainArea');
    const blankKey = 'custom-' + card.id;
    const blanks = state.blanks[blankKey] || [];
    const blankCount = blanks.length;

    area.innerHTML = `
      <div class="content-header">
        <div>
          <span class="card-category-label">${escapeHtml(card.category)}</span>
          <h1 class="card-title-main">${escapeHtml(card.title)}</h1>
        </div>
        <div class="header-actions">
          <div class="mode-toggle" id="modeToggle">
            <button class="mode-btn ${state.mode === 'edit' ? 'active' : ''}" data-mode="edit">편집 모드</button>
            <button class="mode-btn ${state.mode === 'study' ? 'active' : ''}" data-mode="study" ${blankCount === 0 ? 'disabled' : ''}>암기 모드</button>
          </div>
          <button class="tool-btn danger" onclick="deleteCard('${card.id}')">삭제</button>
        </div>
      </div>

      <div class="stats-bar">
        <div class="stat-item"><span class="stat-label">빈칸 수</span><span class="stat-value ${blankCount > 0 ? 'accent' : ''}">${blankCount}</span></div>
        <div class="stat-item"><span class="stat-label">본문 길이</span><span class="stat-value">${card.body.length}자</span></div>
        <div class="stat-item"><span class="stat-label">현재 모드</span><span class="stat-value brand">${state.mode === 'edit' ? '편집' : '암기'}</span></div>
      </div>

      <div class="toolbar">
        <div class="toolbar-hint">
          <span class="hint-icon">${state.mode === 'edit' ? '!' : '?'}</span>
          ${state.mode === 'edit'
            ? '암기할 부분을 <strong>드래그</strong>로 선택하면 빈칸이 됩니다. 빈칸을 누르면 삭제됩니다.'
            : '빈칸을 클릭하면 답이 나타납니다. 한 번 더 클릭하면 다시 가려집니다.'}
        </div>
        <div class="toolbar-actions">
          ${state.mode === 'edit' ? `
            <button class="tool-btn danger" onclick="clearBlanks()" ${blankCount === 0 ? 'disabled' : ''}>빈칸 초기화</button>
            <button class="tool-btn primary" onclick="switchMode('study')" ${blankCount === 0 ? 'disabled' : ''}>암기 시작 →</button>
          ` : `
            <button class="tool-btn" onclick="revealAll()">전체 공개</button>
            <button class="tool-btn" onclick="hideAll()">전체 숨김</button>
            <button class="tool-btn primary" onclick="switchMode('edit')">편집 모드로</button>
          `}
        </div>
      </div>

      <div class="article-card">
        <div class="article-body ${state.mode === 'study' ? 'study-mode' : ''}" id="articleBody"></div>
      </div>
    `;

    area.querySelectorAll('#modeToggle .mode-btn').forEach(btn => {
      btn.onclick = () => switchMode(btn.dataset.mode);
    });

    renderFillBlankBody(card);
  }

  function renderFillBlankBody(card) {
    const body = document.getElementById('articleBody');
    if (!card || !body) return;

    const blankKey = 'custom-' + card.id;
    const blanks = [...(state.blanks[blankKey] || [])].sort((a, b) => a.start - b.start);
    const text = card.body;

    let html = '';
    let cursor = 0;
    blanks.forEach((b, i) => {
      html += escapeHtml(text.slice(cursor, b.start));
      const hint = `빈칸 ${i + 1}`;
      if (state.mode === 'study') {
        html += `<span class="blank-span in-study" data-idx="${i}" data-hint="${hint}">${escapeHtml(b.text)}</span>`;
      } else {
        html += `<span class="blank-span" data-idx="${i}">${escapeHtml(b.text)}</span>`;
      }
      cursor = b.end;
    });
    html += escapeHtml(text.slice(cursor));
    body.innerHTML = html;

    if (state.mode === 'edit') {
      body.onmouseup = handleSelection;
      body.ontouchend = handleSelection;
      body.querySelectorAll('.blank-span').forEach(el => {
        el.onclick = (e) => { e.stopPropagation(); removeBlank(parseInt(el.dataset.idx)); };
      });
    } else {
      body.querySelectorAll('.blank-span.in-study').forEach(el => {
        el.onclick = () => el.classList.toggle('revealed');
      });
    }
  }

  // === O/X 카드 ===
  function renderOXCard(card) {
    let data;
    try { data = JSON.parse(card.body); } catch { data = { q: card.body, a: 'O', e: '' }; }
    currentCardData = data;

    const area = document.getElementById('mainArea');
    area.innerHTML = `
      <div class="content-header">
        <div>
          <span class="card-category-label">${escapeHtml(card.category)}</span>
          <span class="type-badge type-ox type-badge-lg">O/X</span>
          <h1 class="card-title-main">${escapeHtml(card.title)}</h1>
        </div>
        <div class="header-actions">
          <div class="mode-toggle" id="modeToggle">
            <button class="mode-btn ${state.mode === 'edit' ? 'active' : ''}" data-mode="edit">카드 보기</button>
            <button class="mode-btn ${state.mode === 'study' ? 'active' : ''}" data-mode="study">암기 모드</button>
          </div>
          <button class="tool-btn danger" onclick="deleteCard('${card.id}')">삭제</button>
        </div>
      </div>

      <div class="article-card">
        ${state.mode === 'edit' ? `
          <div class="structured-preview">
            <div class="preview-section">
              <div class="preview-label">문제</div>
              <div class="preview-content">${escapeHtml(data.q || '')}</div>
            </div>
            <div class="preview-section">
              <div class="preview-label">정답</div>
              <div class="preview-content">
                <span class="answer-badge ${data.a === 'O' ? 'answer-o' : 'answer-x'}">${data.a === 'O' ? 'O — 옳음' : 'X — 틀림'}</span>
              </div>
            </div>
            ${data.e ? `<div class="preview-section">
              <div class="preview-label">해설</div>
              <div class="preview-content" style="font-size:17px;color:var(--text-sub)">${escapeHtml(data.e)}</div>
            </div>` : ''}
          </div>
        ` : `
          <div class="quiz-interface" id="oxQuizInterface">
            <div class="quiz-question">${escapeHtml(data.q || '')}</div>
            <div class="ox-buttons">
              <button class="ox-btn ox-o" data-val="O">O</button>
              <button class="ox-btn ox-x" data-val="X">X</button>
            </div>
            <div class="quiz-result" id="quizResult" style="display:none"></div>
          </div>
        `}
      </div>
    `;

    area.querySelectorAll('#modeToggle .mode-btn').forEach(btn => {
      btn.onclick = () => switchMode(btn.dataset.mode);
    });

    if (state.mode === 'study') {

  // === 표 카드 ===
  function parseTableData(body) {
    try {
      const d = JSON.parse(body);
      if (d && Array.isArray(d.rows)) return d;
    } catch {}
    // 구형 파이프 구분 형식 호환
    const rows = body.trim().split('\n').filter(r => r.trim())
      .map(row => row.split('|').map(cell => ({ t: cell.trim(), r: 1, c: 1 })));
    return { rows };
  }

  function renderTableCard(card) {
    const area = document.getElementById('mainArea');
    const blankKey = 'custom-' + card.id;
    const tableBlanks = state.blanks[blankKey] || [];
    const blankCount = tableBlanks.length;

    area.innerHTML = `
      <div class="content-header">
        <div>
          <span class="card-category-label">${escapeHtml(card.category)}</span>
          <span class="type-badge type-table type-badge-lg">표</span>
          <h1 class="card-title-main">${escapeHtml(card.title)}</h1>
        </div>
        <div class="header-actions">
          <div class="mode-toggle" id="modeToggle">
            <button class="mode-btn ${state.mode === 'edit' ? 'active' : ''}" data-mode="edit">편집 모드</button>
            <button class="mode-btn ${state.mode === 'study' ? 'active' : ''}" data-mode="study" ${blankCount === 0 ? 'disabled' : ''}>암기 모드</button>
          </div>
          <button class="tool-btn danger" onclick="deleteCard('${card.id}')">삭제</button>
        </div>
      </div>

      <div class="stats-bar">
        <div class="stat-item"><span class="stat-label">빈칸 수</span><span class="stat-value ${blankCount > 0 ? 'accent' : ''}">${blankCount}</span></div>
        <div class="stat-item"><span class="stat-label">현재 모드</span><span class="stat-value brand">${state.mode === 'edit' ? '편집' : '암기'}</span></div>
      </div>

      <div class="toolbar">
        <div class="toolbar-hint">
          <span class="hint-icon">${state.mode === 'edit' ? '!' : '?'}</span>
          ${state.mode === 'edit'
            ? '표의 <strong>셀을 클릭</strong>하면 빈칸이 됩니다. 빈칸 셀을 다시 클릭하면 해제됩니다.'
            : '빈칸 셀을 클릭하면 내용이 나타납니다.'}
        </div>
        <div class="toolbar-actions">
          ${state.mode === 'edit' ? `
            <button class="tool-btn danger" onclick="clearBlanks()" ${blankCount === 0 ? 'disabled' : ''}>빈칸 초기화</button>
            <button class="tool-btn primary" onclick="switchMode('study')" ${blankCount === 0 ? 'disabled' : ''}>암기 시작 →</button>
          ` : `
            <button class="tool-btn" onclick="revealAll()">전체 공개</button>
            <button class="tool-btn" onclick="hideAll()">전체 숨김</button>
            <button class="tool-btn primary" onclick="switchMode('edit')">편집 모드로</button>
          `}
        </div>
      </div>

      <div class="article-card" style="overflow-x:auto;padding:32px 40px">
        <div id="tableContainer"></div>
      </div>
    `;

    area.querySelectorAll('#modeToggle .mode-btn').forEach(btn => {
      btn.onclick = () => switchMode(btn.dataset.mode);
    });

    renderTableBody(card);
  }

  function renderTableBody(card) {
    const container = document.getElementById('tableContainer');
    if (!container) return;

    const { rows } = parseTableData(card.body);
    if (!rows.length) {
      container.innerHTML = '<p style="color:var(--text-mute);text-align:center;padding:24px">표 데이터가 없습니다.</p>';
      return;
    }

    const blankKey = 'custom-' + card.id;
    const tableBlanks = state.blanks[blankKey] || [];
    function isBlank(r, c) { return tableBlanks.some(b => b.row === r && b.col === c); }

    const [headerRow, ...dataRows] = rows;

    let html = '<table class="study-table"><thead><tr>';
    headerRow.forEach((cell, ci) => {
      if (cell === null) return;
      const blanked = isBlank(0, ci);
      const cls = blanked ? (state.mode === 'edit' ? 'cell-blanked' : 'cell-hidden') : '';
      const display = blanked && state.mode === 'study' ? '' : escapeHtml(cell.t);
      const rs = cell.r > 1 ? ` rowspan="${cell.r}"` : '';
      const cs = cell.c > 1 ? ` colspan="${cell.c}"` : '';
      html += `<th${rs}${cs} class="${cls}" data-row="0" data-col="${ci}" data-text="${escapeHtml(cell.t)}">${display}</th>`;
    });
    html += '</tr></thead><tbody>';

    dataRows.forEach((row, ri) => {
      const actualRow = ri + 1;
      html += '<tr>';
      row.forEach((cell, ci) => {
        if (cell === null) return;
        const blanked = isBlank(actualRow, ci);
        const cls = blanked ? (state.mode === 'edit' ? 'cell-blanked' : 'cell-hidden') : '';
        const display = blanked && state.mode === 'study' ? '' : escapeHtml(cell.t);
        const rs = cell.r > 1 ? ` rowspan="${cell.r}"` : '';
        const cs = cell.c > 1 ? ` colspan="${cell.c}"` : '';
        html += `<td${rs}${cs} class="${cls}" data-row="${actualRow}" data-col="${ci}" data-text="${escapeHtml(cell.t)}">${display}</td>`;
      });
      html += '</tr>';
    });
    html += '</tbody></table>';

    container.innerHTML = html;

    if (state.mode === 'edit') {
      container.querySelectorAll('td, th').forEach(cell => {
        cell.style.cursor = 'pointer';
        cell.onclick = () => toggleTableCell(
          parseInt(cell.dataset.row), parseInt(cell.dataset.col), cell.dataset.text, card
        );
      });
    } else {
      container.querySelectorAll('.cell-hidden').forEach(cell => {
        cell.onclick = () => {
          const revealed = cell.classList.toggle('cell-revealed');
          cell.textContent = revealed ? cell.dataset.text : '';
        };
      });
    }
  }

  async function toggleTableCell(row, col, text, card) {
    const blankKey = 'custom-' + card.id;
    if (!state.blanks[blankKey]) state.blanks[blankKey] = [];

    const idx = state.blanks[blankKey].findIndex(b => b.row === row && b.col === col);
    if (idx >= 0) {
      state.blanks[blankKey].splice(idx, 1);
      if (state.blanks[blankKey].length === 0) delete state.blanks[blankKey];
      toast('빈칸 해제');
    } else {
      state.blanks[blankKey].push({ row, col, text });
      toast(`빈칸 추가: "${truncate(text, 20)}"`);
    }

    renderMain();
    await blanksAPI.save(blankKey, state.blanks[blankKey] || []);
  }

  // === 표 에디터 (생성 폼) ===
  let tblData = null;
  let tblSel = { anchor: null, focus: null }; // 각각 [row, col]

  function tblEmpty(rows, cols) {
    return { rows: Array.from({length: rows}, () =>
      Array.from({length: cols}, () => ({ t: '', r: 1, c: 1 }))
    )};
  }

  function tblGetRect() {
    if (!tblSel.anchor) return null;
    const [ar, ac] = tblSel.anchor;
    const [fr, fc] = tblSel.focus || tblSel.anchor;
    return { r0: Math.min(ar,fr), r1: Math.max(ar,fr), c0: Math.min(ac,fc), c1: Math.max(ac,fc) };
  }

  function tblCellInRect(r, c, cellR, cellC, rect) {
    return r <= rect.r1 && (r + cellR - 1) >= rect.r0 && c <= rect.c1 && (c + cellC - 1) >= rect.c0;
  }

  function initTableEditor() {
    if (!tblData) tblData = tblEmpty(3, 3);
    tblSel = { anchor: null, focus: null };
    renderTableEditorInForm();
    // 툴바 버튼 이벤트
    document.getElementById('tblAddRowBtn')?.addEventListener('click', tblAddRow);
    document.getElementById('tblRemRowBtn')?.addEventListener('click', tblRemoveRow);
    document.getElementById('tblAddColBtn')?.addEventListener('click', tblAddCol);
    document.getElementById('tblRemColBtn')?.addEventListener('click', tblRemoveCol);
    document.getElementById('tblMergeBtn')?.addEventListener('click', tblMerge);
    document.getElementById('tblSplitBtn')?.addEventListener('click', tblSplit);
  }

  function renderTableEditorInForm() {
    const grid = document.getElementById('tableEditorGrid');
    if (!grid || !tblData) return;
    const { rows } = tblData;
    const rect = tblGetRect();

    let html = '<table>';
    rows.forEach((row, ri) => {
      html += ri === 0 ? '<thead><tr>' : (ri === 1 ? '<tbody><tr>' : '<tr>');
      row.forEach((cell, ci) => {
        if (cell === null) return;
        const tag = ri === 0 ? 'th' : 'td';
        const rs = cell.r > 1 ? ` rowspan="${cell.r}"` : '';
        const cs = cell.c > 1 ? ` colspan="${cell.c}"` : '';
        const isSel = rect && tblCellInRect(ri, ci, cell.r, cell.c, rect);
        const selCls = isSel ? ' te-cell-sel' : '';
        const isMerged = cell.r > 1 || cell.c > 1;
        html += `<${tag}${rs}${cs} class="${selCls}" data-r="${ri}" data-c="${ci}">`;
        html += `<textarea class="te-input" data-r="${ri}" data-c="${ci}" rows="1">${escapeHtml(cell.t)}</textarea>`;
        if (isMerged) {
          const label = (cell.c > 1 ? cell.c + '열' : '') + (cell.r > 1 ? cell.r + '행' : '');
          html += `<span class="te-merge-label">${label}</span>`;
        }
        html += `</${tag}>`;
      });
      if (ri === 0) html += '</tr></thead>';
      else html += '</tr>';
    });
    if (rows.length > 1) html += '</tbody>';
    html += '</table>';
    grid.innerHTML = html;

    grid.querySelectorAll('.te-input').forEach(inp => {
      teAutoGrow(inp);
      inp.addEventListener('input', () => {
        const r = +inp.dataset.r, c = +inp.dataset.c;
        if (tblData.rows[r]?.[c]) tblData.rows[r][c].t = inp.value;
        teAutoGrow(inp);
      });
      inp.addEventListener('mousedown', e => {
        const r = +inp.dataset.r, c = +inp.dataset.c;
        if (e.shiftKey && tblSel.anchor) {
          tblSel.focus = [r, c];
          e.preventDefault();
        } else {
          tblSel.anchor = [r, c];
          tblSel.focus = [r, c];
        }
        renderTableEditorInForm();
        // 리렌더 후 해당 셀에 포커스 복원
        requestAnimationFrame(() => {
          grid.querySelector(`.te-input[data-r="${r}"][data-c="${c}"]`)?.focus();
        });
      });
    });

    tblUpdateButtons();
  }

  function teAutoGrow(el) {
    el.style.height = 'auto';
    el.style.height = el.scrollHeight + 'px';
  }

  function tblUpdateButtons() {
    const rect = tblGetRect();
    const mergeBtn = document.getElementById('tblMergeBtn');
    const splitBtn = document.getElementById('tblSplitBtn');
    if (!mergeBtn || !splitBtn) return;

    const isMulti = rect && (rect.r0 !== rect.r1 || rect.c0 !== rect.c1);
    mergeBtn.disabled = !isMulti;

    const isSingle = rect && rect.r0 === rect.r1 && rect.c0 === rect.c1;
    const selCell = isSingle ? tblData.rows[rect.r0]?.[rect.c0] : null;
    splitBtn.disabled = !(selCell && (selCell.r > 1 || selCell.c > 1));
  }

  function tblAddRow() {
    const cols = tblData.rows[0].reduce((s, c) => s + (c ? c.c : 0), 0);
    tblData.rows.push(Array.from({length: cols}, () => ({ t: '', r: 1, c: 1 })));
    renderTableEditorInForm();
  }

  function tblRemoveRow() {
    if (tblData.rows.length <= 1) return;
    const last = tblData.rows[tblData.rows.length - 1];
    if (last.some(c => c === null)) { toast('병합 셀 포함 — 먼저 나누기를 해주세요'); return; }
    tblData.rows.pop();
    renderTableEditorInForm();
  }

  function tblAddCol() {
    tblData.rows.forEach(row => row.push({ t: '', r: 1, c: 1 }));
    renderTableEditorInForm();
  }

  function tblRemoveCol() {
    for (const row of tblData.rows) {
      const last = row[row.length - 1];
      if (!last || last.r > 1 || last.c > 1) { toast('병합 셀 포함 — 먼저 나누기를 해주세요'); return; }
    }
    if (tblData.rows[0].length <= 1) return;
    tblData.rows.forEach(row => row.pop());
    renderTableEditorInForm();
  }

  function tblMerge() {
    const rect = tblGetRect();
    if (!rect) return;
    // 선택 범위 안에 이미 병합된 셀 있으면 거부
    for (let r = rect.r0; r <= rect.r1; r++) {
      for (let c = rect.c0; c <= rect.c1; c++) {
        const cell = tblData.rows[r]?.[c];
        if (!cell || cell.r !== 1 || cell.c !== 1) {
          toast('이미 병합된 셀이 포함되어 있습니다. 먼저 나누기를 해주세요.');
          return;
        }
      }
    }
    const rowspan = rect.r1 - rect.r0 + 1;
    const colspan = rect.c1 - rect.c0 + 1;
    // 텍스트 수집 (비어있지 않은 것만)
    const texts = [];
    for (let r = rect.r0; r <= rect.r1; r++)
      for (let c = rect.c0; c <= rect.c1; c++) {
        const t = tblData.rows[r][c].t.trim();
        if (t) texts.push(t);
      }
    tblData.rows[rect.r0][rect.c0] = { t: texts.join(' '), r: rowspan, c: colspan };
    for (let r = rect.r0; r <= rect.r1; r++)
      for (let c = rect.c0; c <= rect.c1; c++)
        if (!(r === rect.r0 && c === rect.c0)) tblData.rows[r][c] = null;
    tblSel = { anchor: [rect.r0, rect.c0], focus: [rect.r0, rect.c0] };
    renderTableEditorInForm();
    toast('셀이 병합되었습니다');
  }

  function tblSplit() {
    const rect = tblGetRect();
    if (!rect || rect.r0 !== rect.r1 || rect.c0 !== rect.c1) return;
    const cell = tblData.rows[rect.r0]?.[rect.c0];
    if (!cell) return;
    const { r: rowspan, c: colspan, t: text } = cell;
    tblData.rows[rect.r0][rect.c0] = { t: text, r: 1, c: 1 };
    for (let r = rect.r0; r < rect.r0 + rowspan; r++)
      for (let c = rect.c0; c < rect.c0 + colspan; c++)
        if (!(r === rect.r0 && c === rect.c0)) tblData.rows[r][c] = { t: '', r: 1, c: 1 };
    renderTableEditorInForm();
    toast('셀이 분리되었습니다');
  }

  // === 드래그 빈칸 (fill-blank용) ===
  function handleSelection() {
    if (state.mode !== 'edit') return;
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed || sel.rangeCount === 0) return;
    const body = document.getElementById('articleBody');
    const card = findCard(state.currentCardId);
    if (!body || !card) return;
    const range = sel.getRangeAt(0);
    if (!body.contains(range.commonAncestorContainer)) return;
    const selectedText = sel.toString();
    if (!selectedText.trim()) return;
    const container = range.commonAncestorContainer;
    if ((container.nodeType === Node.ELEMENT_NODE && container.classList?.contains('blank-span')) ||
        container.parentElement?.classList?.contains('blank-span')) {
      sel.removeAllRanges(); return;
    }
    const blankKey = 'custom-' + card.id;
    const result = computeOriginalOffset(body, range, card.body, state.blanks[blankKey] || []);
    if (!result) { sel.removeAllRanges(); return; }
    addBlank(result.start, result.end, selectedText);
    sel.removeAllRanges();
  }

  function computeOriginalOffset(body, range, originalText, blanks) {
    const startOffset = getTextOffset(body, range.startContainer, range.startOffset);
    const endOffset = getTextOffset(body, range.endContainer, range.endOffset);
    if (startOffset === null || endOffset === null || startOffset >= endOffset) return null;
    for (const b of blanks) {
      if (!(endOffset <= b.start || startOffset >= b.end)) return null;
    }
    if (originalText.slice(startOffset, endOffset).length === 0) return null;
    return { start: startOffset, end: endOffset };
  }

  function getTextOffset(root, node, offset) {
    if (!root.contains(node)) return null;
    let total = 0;
    const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null);
    let current;
    while ((current = walker.nextNode())) {
      if (current === node) return total + offset;
      total += current.textContent.length;
    }
    return null;
  }

  // === 빈칸 관리 (fill-blank) ===
  async function addBlank(start, end, text) {
    const card = findCard(state.currentCardId);
    if (!card) return;
    const blankKey = 'custom-' + card.id;
    if (!state.blanks[blankKey]) state.blanks[blankKey] = [];
    state.blanks[blankKey].push({ start, end, text });
    state.blanks[blankKey].sort((a, b) => a.start - b.start);
    renderMain();
    toast(`빈칸 추가: "${truncate(text, 20)}"`);
    await blanksAPI.save(blankKey, state.blanks[blankKey]);
  }

  async function removeBlank(idx) {
    const card = findCard(state.currentCardId);
    if (!card) return;
    const blankKey = 'custom-' + card.id;
    if (!state.blanks[blankKey]) return;
    const removed = state.blanks[blankKey].splice(idx, 1)[0];
    if (state.blanks[blankKey].length === 0) delete state.blanks[blankKey];
    renderMain();
    if (removed) toast(`빈칸 삭제: "${truncate(removed.text, 20)}"`);
    await blanksAPI.save(blankKey, state.blanks[blankKey] || []);
  }

  async function clearBlanks() {
    const card = findCard(state.currentCardId);
    if (!card) return;
    if (!confirm('이 카드의 모든 빈칸을 삭제할까요?')) return;
    const blankKey = 'custom-' + card.id;
    delete state.blanks[blankKey];
    renderMain();
    toast('빈칸을 모두 초기화했습니다');
    await blanksAPI.save(blankKey, []);
  }

  async function deleteCard(id) {
    const card = findCard(id);
    if (!card) return;
    if (!confirm(`"${card.title}" 카드를 삭제할까요? 빈칸 데이터도 함께 삭제됩니다.`)) return;

    const blankKey = 'custom-' + id;
    await blanksAPI.save(blankKey, []);
    await cardsAPI.remove(id);

    state.cards = state.cards.filter(c => c.id !== id);
    delete state.blanks[blankKey];
    state.currentCardId = null;
    renderCardList();
    document.getElementById('mainArea').innerHTML = `
      <div class="empty-state"><h3>카드를 선택하세요</h3><p>왼쪽에서 카드를 선택하거나 새 카드를 추가하세요.</p></div>
    `;
    toast('카드가 삭제되었습니다');
  }

  function switchMode(mode) {
    const card = findCard(state.currentCardId);
    if (!card) return;
    const ct = card.card_type || 'fill-blank';

    // 빈칸 채우기 / 표는 빈칸 없으면 암기 모드 불가
    if (mode === 'study' && (ct === 'fill-blank' || ct === 'table')) {
      const blankKey = 'custom-' + card.id;
      if ((state.blanks[blankKey] || []).length === 0) {
        toast('먼저 편집 모드에서 빈칸을 만드세요');
        return;
      }
    }
    state.mode = mode;
    renderMain();
  }

  function revealAll() {
    document.querySelectorAll('.blank-span.in-study').forEach(el => el.classList.add('revealed'));
    document.querySelectorAll('.cell-hidden').forEach(el => {
      el.classList.add('cell-revealed');
      el.textContent = el.dataset.text;
    });
  }

  function hideAll() {
    document.querySelectorAll('.blank-span.in-study').forEach(el => el.classList.remove('revealed'));
    document.querySelectorAll('.cell-hidden').forEach(el => {
      el.classList.remove('cell-revealed');
      el.textContent = '';
    });
  }

  function resetOX() {
    const card = findCard(state.currentCardId);
    if (card) renderOXCard(card);
  }

  function resetSubjective() {
    const card = findCard(state.currentCardId);
    if (card) renderSubjectiveCard(card);
  }

  // === 유틸 ===
  function findCard(id) { return state.cards.find(c => c.id === id) || null; }
  function escapeHtml(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }
  function truncate(s, n) { s = String(s); return s.length <= n ? s : s.slice(0, n) + '…'; }
  function toast(msg) {
    const t = document.getElementById('toast');
    t.innerHTML = `<span>${escapeHtml(msg)}</span>`;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 1800);
  }

  // 전역 노출
  window.saveNewCard = saveNewCard;
  window.cancelCreate = cancelCreate;
  window.clearBlanks = clearBlanks;
  window.deleteCard = deleteCard;
  window.switchMode = switchMode;
  window.revealAll = revealAll;
  window.hideAll = hideAll;
  window.resetOX = resetOX;
  window.resetSubjective = resetSubjective;
</script>
</body>
</html>
