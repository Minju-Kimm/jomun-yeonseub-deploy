<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>조문 암기 | 산업재산권법 조문연습</title>
<meta name="description" content="특허법, 상표법, 디자인보호법 조문을 드래그로 빈칸 만들어 암기하세요.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F9FAFB;
    --bg-card: #FFFFFF;
    --text: #191F28;
    --text-sub: #4E5968;
    --text-mute: #8B95A1;
    --border: #F2F4F6;
    --border-strong: #E5E8EB;
    --brand: #3182F6;
    --brand-sub: #E8F3FF;
    --brand-hover: #1B64DA;
    --accent: #FFF3CD;
    --accent-strong: #F4A100;
    --success: #00C471;
    --success-sub: #E6F9F0;
    --danger: #F04452;
    --danger-sub: #FFEBED;
    --radius: 14px;
    --radius-lg: 20px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    letter-spacing: -0.01em;
  }

  /* Navigation */
  nav {
    position: sticky; top: 0; background: rgba(249, 250, 251, 0.85);
    backdrop-filter: saturate(180%) blur(12px);
    -webkit-backdrop-filter: saturate(180%) blur(12px);
    z-index: 100; border-bottom: 1px solid var(--border);
  }
  .nav-inner {
    display: flex; align-items: center; justify-content: space-between;
    height: 64px; max-width: 1280px; margin: 0 auto; padding: 0 24px;
  }
  .logo {
    font-size: 18px; font-weight: 800; color: var(--text);
    text-decoration: none; letter-spacing: -0.03em;
  }
  .nav-links { display: flex; gap: 28px; align-items: center; }
  .nav-links a {
    color: var(--text-sub); text-decoration: none; font-size: 15px; font-weight: 500;
    transition: color 0.15s;
  }
  .nav-links a:hover { color: var(--text); }

  /* Main Layout */
  .layout {
    display: grid; grid-template-columns: 280px 1fr;
    max-width: 1280px; margin: 0 auto; min-height: calc(100vh - 64px);
  }

  /* Sidebar */
  aside {
    border-right: 1px solid var(--border); padding: 24px 0;
    position: sticky; top: 64px; height: calc(100vh - 64px); overflow-y: auto;
  }
  .law-tabs {
    display: flex; gap: 4px; padding: 0 16px 16px;
    border-bottom: 1px solid var(--border); margin-bottom: 16px;
  }
  .law-tab {
    flex: 1; padding: 10px 4px; font-size: 13px; font-weight: 600;
    background: transparent; border: none; color: var(--text-mute); cursor: pointer;
    border-radius: 8px; transition: all 0.15s; font-family: inherit;
  }
  .law-tab.active { background: var(--text); color: white; }
  .law-tab:not(.active):hover { background: var(--border); color: var(--text); }

  .sidebar-search {
    padding: 0 16px 16px;
  }
  .sidebar-search input {
    width: 100%; padding: 10px 12px; border: 1px solid var(--border-strong);
    border-radius: 10px; font-size: 14px; font-family: inherit;
    background: var(--bg-card); color: var(--text);
    transition: border-color 0.15s;
  }
  .sidebar-search input:focus {
    outline: none; border-color: var(--brand);
  }

  .article-list {
    padding: 0 8px; list-style: none;
  }
  .article-item {
    padding: 10px 12px; border-radius: 8px; cursor: pointer;
    font-size: 14px; transition: background 0.1s;
    display: flex; justify-content: space-between; align-items: center;
    gap: 8px;
  }
  .article-item:hover { background: var(--border); }
  .article-item.active { background: var(--brand-sub); color: var(--brand); font-weight: 600; }
  .article-num { flex-shrink: 0; font-weight: 600; font-variant-numeric: tabular-nums; }
  .article-title-sm {
    font-size: 12px; color: var(--text-mute); text-overflow: ellipsis;
    overflow: hidden; white-space: nowrap; max-width: 140px;
  }
  .article-item.active .article-title-sm { color: var(--brand); opacity: 0.8; }
  .has-blanks {
    width: 6px; height: 6px; border-radius: 50%; background: var(--accent-strong);
    flex-shrink: 0;
  }
  .chapter-header {
    padding: 16px 12px 6px; font-size: 11px; font-weight: 700;
    color: var(--text-mute); text-transform: uppercase; letter-spacing: 0.05em;
  }

  /* Main Content */
  main { padding: 32px 40px; max-width: none; min-width: 0; }

  .content-header {
    display: flex; justify-content: space-between; align-items: flex-start;
    margin-bottom: 24px; flex-wrap: wrap; gap: 16px;
  }
  .chapter-label {
    font-size: 13px; color: var(--brand); font-weight: 600; margin-bottom: 6px;
  }
  .article-number {
    font-size: 14px; color: var(--text-mute); font-weight: 500; margin-bottom: 4px;
  }
  .article-title-main {
    font-size: 32px; font-weight: 800; letter-spacing: -0.03em; line-height: 1.2;
  }

  /* Mode Toggle */
  .mode-toggle {
    display: inline-flex; background: var(--border); padding: 3px;
    border-radius: 10px; gap: 2px;
  }
  .mode-btn {
    padding: 8px 16px; font-size: 13px; font-weight: 600;
    background: transparent; border: none; border-radius: 8px;
    cursor: pointer; color: var(--text-sub); font-family: inherit;
    transition: all 0.15s;
  }
  .mode-btn.active { background: white; color: var(--text); box-shadow: 0 1px 2px rgba(0,0,0,0.06); }

  /* Toolbar */
  .toolbar {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 16px; margin-bottom: 20px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; flex-wrap: wrap;
  }
  .toolbar-hint {
    font-size: 14px; color: var(--text-sub);
    display: flex; align-items: center; gap: 8px;
  }
  .hint-icon {
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--brand-sub); color: var(--brand);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; flex-shrink: 0;
  }
  .toolbar-actions { display: flex; gap: 8px; }
  .tool-btn {
    padding: 8px 14px; font-size: 13px; font-weight: 600;
    background: white; border: 1px solid var(--border-strong); border-radius: 8px;
    cursor: pointer; color: var(--text); font-family: inherit;
    display: inline-flex; align-items: center; gap: 6px;
    transition: all 0.15s;
  }
  .tool-btn:hover:not(:disabled) { border-color: var(--text-mute); }
  .tool-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .tool-btn.primary { background: var(--brand); color: white; border-color: var(--brand); }
  .tool-btn.primary:hover:not(:disabled) { background: var(--brand-hover); border-color: var(--brand-hover); }
  .tool-btn.danger:hover:not(:disabled) { color: var(--danger); border-color: var(--danger); }

  /* Article Body */
  .article-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 48px 56px; margin-bottom: 24px;
  }
  .article-body {
    font-family: 'Gowun Batang', serif;
    font-size: 19px; line-height: 2.2; color: var(--text);
    white-space: pre-wrap;
    user-select: text;
    -webkit-user-select: text;
  }
  .article-body.study-mode {
    cursor: default;
  }

  /* Blanks */
  .blank-span {
    background: var(--accent);
    border-bottom: 2px solid var(--accent-strong);
    padding: 1px 4px;
    border-radius: 4px 4px 0 0;
    font-family: 'Gowun Batang', serif;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }
  .blank-span:hover {
    background: #FFE899;
  }
  .blank-span.in-study {
    background: var(--brand-sub);
    border-bottom: 2px solid var(--brand);
    color: transparent;
    -webkit-user-select: none;
    user-select: none;
    min-width: 40px;
    display: inline-block;
    text-align: center;
  }
  .blank-span.in-study:hover {
    background: #DCE9FB;
  }
  .blank-span.in-study.revealed {
    background: var(--success-sub);
    border-bottom: 2px solid var(--success);
    color: var(--text);
    font-family: 'Gowun Batang', serif;
  }
  .blank-span.in-study::before {
    content: attr(data-hint);
    color: var(--brand);
    font-family: 'Pretendard', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .blank-span.in-study.revealed::before {
    display: none;
  }

  /* Empty State */
  .empty-state {
    padding: 80px 40px; text-align: center; color: var(--text-mute);
  }
  .empty-state h3 {
    font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 8px;
  }
  .empty-state p { font-size: 15px; line-height: 1.7; }

  /* Stats Footer */
  .stats-bar {
    display: flex; gap: 16px; padding: 16px 20px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); margin-bottom: 24px;
  }
  .stat-item {
    display: flex; flex-direction: column; gap: 2px; flex: 1;
  }
  .stat-label { font-size: 12px; color: var(--text-mute); font-weight: 500; }
  .stat-value { font-size: 20px; font-weight: 700; color: var(--text); font-variant-numeric: tabular-nums; }
  .stat-value.accent { color: var(--accent-strong); }
  .stat-value.brand { color: var(--brand); }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px);
    background: var(--text); color: white; padding: 12px 20px; border-radius: 10px;
    font-size: 14px; font-weight: 500; z-index: 1000;
    transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    box-shadow: 0 4px 24px rgba(0,0,0,0.15);
    display: flex; align-items: center; gap: 8px;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Loading */
  .loading {
    display: flex; align-items: center; justify-content: center;
    padding: 80px; color: var(--text-mute); font-size: 14px;
  }

  /* Sync Banner */
  .sync-banner {
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; padding: 14px 20px;
    background: var(--brand-sub); border: 1px solid rgba(49, 130, 246, 0.15);
    border-radius: var(--radius); margin-bottom: 16px;
    font-size: 14px; color: #0F4C9E;
  }
  .sync-banner.success {
    background: var(--success-sub); color: #006B3C;
    border-color: rgba(0, 196, 113, 0.2);
  }
  .sync-banner-text { display: flex; align-items: center; gap: 10px; flex: 1; }
  .sync-banner-icon {
    width: 20px; height: 20px; flex-shrink: 0;
  }
  .sync-banner-link {
    color: inherit; font-weight: 700; text-decoration: none;
    white-space: nowrap;
  }
  .sync-banner-link:hover { text-decoration: underline; }
  .sync-banner-close {
    background: transparent; border: none; cursor: pointer; color: inherit;
    opacity: 0.5; padding: 4px; font-family: inherit;
  }
  .sync-banner-close:hover { opacity: 1; }

  /* Scrollbar */
  aside::-webkit-scrollbar { width: 6px; }
  aside::-webkit-scrollbar-track { background: transparent; }
  aside::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
  aside::-webkit-scrollbar-thumb:hover { background: var(--text-mute); }

  /* Responsive */
  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
    aside {
      position: fixed; left: -100%; top: 64px; width: 280px;
      background: var(--bg); z-index: 50; height: calc(100vh - 64px);
      transition: left 0.25s;
      border-right: 1px solid var(--border-strong);
    }
    aside.open { left: 0; }
    main { padding: 24px 20px; }
    .article-card { padding: 32px 24px; }
    .article-title-main { font-size: 24px; }
    .article-body { font-size: 17px; }
    .mobile-menu-btn { display: inline-flex; }
  }
  .mobile-menu-btn {
    display: none; background: var(--bg-card); border: 1px solid var(--border-strong);
    padding: 8px 12px; border-radius: 8px; font-size: 13px; font-weight: 600;
    cursor: pointer; font-family: inherit; align-items: center; gap: 6px;
    color: var(--text);
  }
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="logo">산업재산권법 조문연습</a>
    <div class="nav-links">
      <button class="mobile-menu-btn" onclick="document.querySelector('aside').classList.toggle('open')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        조문
      </button>
      <a href="index.html">홈</a>
      <a href="cards.html">커스텀 카드</a>
      <span class="nav-auth"><a href="login.html">로그인</a></span>
    </div>
  </div>
</nav>

<div class="layout">
  <aside id="sidebar">
    <div class="law-tabs">
      <button class="law-tab active" data-law="patent">특허법</button>
      <button class="law-tab" data-law="trademark">상표법</button>
      <button class="law-tab" data-law="design">디자인보호법</button>
    </div>
    <div class="sidebar-search">
      <input type="text" id="searchInput" placeholder="조문 번호 또는 제목 검색">
    </div>
    <ul class="article-list" id="articleList">
      <li class="loading">조문을 불러오는 중...</li>
    </ul>
  </aside>

  <main>
    <div id="contentArea">
      <div class="empty-state">
        <h3>조문을 선택하세요</h3>
        <p>왼쪽에서 암기할 조문을 선택하면 이곳에 표시됩니다.</p>
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  // supabase-client.js 로드 실패 시(키 미설정, 오프라인 등) localStorage 전용 fallback 사용
  const BLANKS_KEY = 'jomun_blanks_v1';
  const authFallback = {
    async getUser() { return null; },
    onChange() { return { data: { subscription: { unsubscribe() {} } } }; },
  };
  const blanksFallback = {
    async getAll() {
      try { return JSON.parse(localStorage.getItem(BLANKS_KEY) || '{}'); } catch { return {}; }
    },
    async save(articleId, arr) {
      try {
        const all = JSON.parse(localStorage.getItem(BLANKS_KEY) || '{}');
        if (arr.length === 0) delete all[articleId];
        else all[articleId] = arr;
        localStorage.setItem(BLANKS_KEY, JSON.stringify(all));
        return { success: true };
      } catch(e) { return { success: false, error: e }; }
    },
  };

  let auth, blanksAPI, renderAuthNav, profileAPI;
  try {
    const mod = await import('./supabase-client.js');
    auth = mod.auth;
    blanksAPI = mod.blanks;
    renderAuthNav = mod.renderAuthNav;
    profileAPI = mod.profile;
  } catch(e) {
    console.warn('supabase-client.js 로드 실패 — 로컬 저장소 모드로 전환:', e.message);
    auth = authFallback;
    blanksAPI = blanksFallback;
    renderAuthNav = () => {};
    profileAPI = null;
  }

  // 네비 인증 상태 반영
  renderAuthNav();

  // 상태 관리
  const FREE_ARTICLE_LIMIT = 5;

  const state = {
    currentLaw: 'patent',
    currentArticleId: null,
    articles: {},      // {law: [articles]}
    mode: 'edit',      // 'edit' | 'study'
    blanks: {},        // {articleId: [{start, end, text}]}
    isLoggedIn: false,
    isPremium: false,
    syncTimer: null,   // 디바운스용
  };

  // 초기화
  await initAuth();
  initLawTabs();
  initSearch();

  // URL 쿼리에서 딥링크 처리: ?article=patent-29
  const params = new URLSearchParams(location.search);
  const deepLinkId = params.get('article');
  if (deepLinkId) {
    const match = deepLinkId.match(/^(patent|trademark|design)-/);
    const slug = match ? match[1] : 'patent';
    // 해당 법령 탭 활성화
    document.querySelectorAll('.law-tab').forEach(b => {
      b.classList.toggle('active', b.dataset.law === slug);
    });
    await loadLaw(slug);
    // 데이터 로드 후 해당 조문 자동 선택
    if (findArticle(deepLinkId)) {
      selectArticle(deepLinkId);
      // 브라우저 히스토리에서 쿼리 제거 (깔끔하게)
      history.replaceState(null, '', 'study.html');
    }
  } else {
    loadLaw('patent');
  }

  // === 인증 상태 초기화 + 구독 ===
  async function initAuth() {
    const user = await auth.getUser();
    state.isLoggedIn = !!user;
    state.blanks = await blanksAPI.getAll();
    state.isPremium = profileAPI ? await profileAPI.isPremium().catch(() => false) : false;

    // 로그인 상태 변화 구독 (다른 탭에서 로그인/로그아웃 시도 처리)
    auth.onChange(async (event, newUser) => {
      const wasLoggedIn = state.isLoggedIn;
      state.isLoggedIn = !!newUser;
      // 상태가 실제로 바뀌었을 때만 재로드
      if (wasLoggedIn !== state.isLoggedIn) {
        state.blanks = await blanksAPI.getAll();
        renderArticleList(document.getElementById('searchInput')?.value || '');
        renderContent();
      }
    });
  }

  // === 데이터 로딩 ===
  async function loadLaw(slug) {
    state.currentLaw = slug;
    const list = document.getElementById('articleList');

    if (!state.articles[slug]) {
      list.innerHTML = '<li class="loading">조문을 불러오는 중...</li>';
      try {
        const res = await fetch(`${slug}.json`);
        const data = await res.json();
        state.articles[slug] = data.articles;
      } catch (e) {
        list.innerHTML = `<li class="loading">불러오기 실패. 파일 위치를 확인하세요.</li>`;
        return;
      }
    }
    renderArticleList();
  }

  function renderArticleList(filter = '') {
    const list = document.getElementById('articleList');
    const articles = state.articles[state.currentLaw] || [];
    const kw = filter.trim().toLowerCase();

    let html = '';
    let lastChapter = null;

    for (const art of articles) {
      if (kw) {
        const hay = `${art.number} ${art.title}`.toLowerCase();
        if (!hay.includes(kw)) continue;
      }
      if (art.chapter && art.chapter !== lastChapter) {
        html += `<li class="chapter-header">${escapeHtml(art.chapter)}</li>`;
        lastChapter = art.chapter;
      }
      const hasBlanks = (state.blanks[art.id] && state.blanks[art.id].length > 0);
      const isActive = art.id === state.currentArticleId;
      html += `
        <li class="article-item ${isActive ? 'active' : ''}" data-id="${art.id}">
          <span class="article-num">${escapeHtml(art.number)}</span>
          <span class="article-title-sm">${escapeHtml(art.title)}</span>
          ${hasBlanks ? '<span class="has-blanks" title="빈칸 저장됨"></span>' : ''}
        </li>
      `;
    }

    if (!html) html = '<li class="loading">검색 결과 없음</li>';
    list.innerHTML = html;

    list.querySelectorAll('.article-item[data-id]').forEach(el => {
      el.onclick = () => selectArticle(el.dataset.id);
    });
  }

  // === 조문 선택 ===
  function selectArticle(id) {
    state.currentArticleId = id;
    state.mode = 'edit';
    renderArticleList(document.getElementById('searchInput').value);
    renderContent();
    if (window.innerWidth <= 900) {
      document.querySelector('aside').classList.remove('open');
    }
  }

  // === 컨텐츠 렌더링 ===
  function renderContent() {
    const area = document.getElementById('contentArea');
    const art = findArticle(state.currentArticleId);
    if (!art) {
      area.innerHTML = `<div class="empty-state"><h3>조문을 선택하세요</h3><p>왼쪽에서 암기할 조문을 선택하면 이곳에 표시됩니다.</p></div>`;
      return;
    }

    const blanks = state.blanks[art.id] || [];
    const blankCount = blanks.length;

    area.innerHTML = `
      ${renderSyncBanner(blankCount)}
      <div class="content-header">
        <div>
          ${art.chapter ? `<div class="chapter-label">${escapeHtml(art.chapter)}</div>` : ''}
          <div class="article-number">${escapeHtml(art.number)}</div>
          <h1 class="article-title-main">${escapeHtml(art.title)}</h1>
        </div>
        <div class="mode-toggle" id="modeToggle">
          <button class="mode-btn ${state.mode === 'edit' ? 'active' : ''}" data-mode="edit">편집 모드</button>
          <button class="mode-btn ${state.mode === 'study' ? 'active' : ''}" data-mode="study" ${blankCount === 0 ? 'disabled' : ''}>암기 모드</button>
        </div>
      </div>

      <div class="stats-bar">
        <div class="stat-item">
          <span class="stat-label">빈칸 수</span>
          <span class="stat-value ${blankCount > 0 ? 'accent' : ''}">${blankCount}</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">본문 길이</span>
          <span class="stat-value">${art.body.length}자</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">현재 모드</span>
          <span class="stat-value brand">${state.mode === 'edit' ? '편집' : '암기'}</span>
        </div>
      </div>

      <div class="toolbar">
        <div class="toolbar-hint">
          <span class="hint-icon">${state.mode === 'edit' ? '!' : '?'}</span>
          ${state.mode === 'edit'
            ? '암기할 부분을 <strong>드래그</strong>로 선택하면 빈칸이 됩니다. 빈칸을 누르면 삭제됩니다.'
            : '빈칸을 클릭하면 답이 나타납니다. 한 번 더 클릭하면 다시 가려집니다.'}
        </div>
        <div class="toolbar-actions">
          ${state.mode === 'edit' ? `
            <button class="tool-btn danger" onclick="clearBlanks()" ${blankCount === 0 ? 'disabled' : ''}>빈칸 초기화</button>
            <button class="tool-btn primary" onclick="switchMode('study')" ${blankCount === 0 ? 'disabled' : ''}>암기 시작 →</button>
          ` : `
            <button class="tool-btn" onclick="revealAll()">전체 공개</button>
            <button class="tool-btn" onclick="hideAll()">전체 숨김</button>
            <button class="tool-btn primary" onclick="switchMode('edit')">편집 모드로</button>
          `}
        </div>
      </div>

      <div class="article-card">
        <div class="article-body ${state.mode === 'study' ? 'study-mode' : ''}" id="articleBody"></div>
      </div>
    `;

    // 모드 토글 바인딩
    area.querySelectorAll('#modeToggle .mode-btn').forEach(btn => {
      btn.onclick = () => switchMode(btn.dataset.mode);
    });

    renderArticleBody();
  }

  // === 본문 렌더링 (빈칸 반영) ===
  function renderArticleBody() {
    const art = findArticle(state.currentArticleId);
    const body = document.getElementById('articleBody');
    if (!art || !body) return;

    const blanks = [...(state.blanks[art.id] || [])].sort((a, b) => a.start - b.start);
    const text = art.body;

    let html = '';
    let cursor = 0;
    blanks.forEach((b, i) => {
      html += escapeHtml(text.slice(cursor, b.start));
      const hint = `빈칸 ${i + 1}`;
      if (state.mode === 'study') {
        html += `<span class="blank-span in-study" data-idx="${i}" data-hint="${hint}">${escapeHtml(b.text)}</span>`;
      } else {
        html += `<span class="blank-span" data-idx="${i}">${escapeHtml(b.text)}</span>`;
      }
      cursor = b.end;
    });
    html += escapeHtml(text.slice(cursor));

    body.innerHTML = html;

    // 이벤트 바인딩
    if (state.mode === 'edit') {
      // 드래그 종료 → 선택 영역을 빈칸으로
      body.onmouseup = handleSelection;
      body.ontouchend = handleSelection;
      // 빈칸 클릭 → 삭제
      body.querySelectorAll('.blank-span').forEach(el => {
        el.onclick = (e) => {
          e.stopPropagation();
          removeBlank(parseInt(el.dataset.idx));
        };
      });
    } else {
      // 암기 모드: 빈칸 클릭 → 공개/숨김 토글
      body.querySelectorAll('.blank-span.in-study').forEach(el => {
        el.onclick = () => el.classList.toggle('revealed');
      });
    }
  }

  // === 드래그로 빈칸 만들기 ===
  function handleSelection() {
    if (state.mode !== 'edit') return;
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed || sel.rangeCount === 0) return;

    const body = document.getElementById('articleBody');
    const art = findArticle(state.currentArticleId);
    if (!body || !art) return;

    const range = sel.getRangeAt(0);
    // 선택이 article body 내부인지 확인
    if (!body.contains(range.commonAncestorContainer)) return;

    const selectedText = sel.toString();
    if (!selectedText.trim()) return;

    // 선택 텍스트가 이미 빈칸 내부인지 체크 (빈칸 span을 타고 있으면 무시)
    const container = range.commonAncestorContainer;
    if (container.nodeType === Node.ELEMENT_NODE && container.classList && container.classList.contains('blank-span')) {
      sel.removeAllRanges();
      return;
    }
    if (container.parentElement && container.parentElement.classList.contains('blank-span')) {
      sel.removeAllRanges();
      return;
    }

    // 원본 텍스트에서의 position 계산: 현재 빈칸들을 모두 풀어서 full text에서 offset 찾기
    const result = computeOriginalOffset(body, range, art.body, state.blanks[art.id] || []);
    if (!result) {
      sel.removeAllRanges();
      return;
    }

    addBlank(result.start, result.end, selectedText);
    sel.removeAllRanges();
  }

  // DOM range → 원본 텍스트 offset 계산
  function computeOriginalOffset(body, range, originalText, blanks) {
    // DOM 순회하며 range.startContainer/startOffset 위치까지의 "표시 텍스트 offset"을 구함
    // 빈칸 span은 내부 텍스트를 그대로 포함하므로, 실제로는 DOM의 textContent offset이 원본 offset과 동일
    const startOffset = getTextOffset(body, range.startContainer, range.startOffset);
    const endOffset = getTextOffset(body, range.endContainer, range.endOffset);
    if (startOffset === null || endOffset === null || startOffset >= endOffset) return null;

    // 선택 범위가 기존 빈칸과 겹치면 무시
    for (const b of blanks) {
      if (!(endOffset <= b.start || startOffset >= b.end)) return null;
    }
    // 선택된 텍스트가 원본 텍스트의 해당 범위와 일치하는지 검증
    const extracted = originalText.slice(startOffset, endOffset);
    if (extracted.length === 0) return null;

    return { start: startOffset, end: endOffset };
  }

  // 특정 노드/오프셋까지의 textContent 길이 (루트 기준)
  function getTextOffset(root, node, offset) {
    if (!root.contains(node)) return null;
    let total = 0;
    const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null);
    let current;
    while ((current = walker.nextNode())) {
      if (current === node) return total + offset;
      total += current.textContent.length;
    }
    // element 노드를 직접 가리킨 경우
    if (node.nodeType === Node.ELEMENT_NODE) {
      // offset-th child의 앞까지
      let acc = 0;
      const w2 = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null);
      while ((current = w2.nextNode())) {
        // node의 하위에 current가 포함되는지 체크하려면 복잡 → 단순화: node 자체의 이전 형제 텍스트 합산
        acc += current.textContent.length;
        if (current === node || (node.contains && node.contains(current))) break;
      }
      return acc;
    }
    return null;
  }

  // === 빈칸 관리 ===
  async function addBlank(start, end, text) {
    const id = state.currentArticleId;
    // 이 조문에 처음 빈칸을 추가하는 경우 무료 한도 체크
    if (!state.isPremium && !state.blanks[id]) {
      const usedArticles = Object.keys(state.blanks).filter(k => !k.startsWith('custom-')).length;
      if (usedArticles >= FREE_ARTICLE_LIMIT) {
        toast(`무료 플랜은 최대 ${FREE_ARTICLE_LIMIT}개 조문까지 저장할 수 있습니다 — 프리미엄으로 업그레이드하세요`);
        return;
      }
    }
    if (!state.blanks[id]) state.blanks[id] = [];
    state.blanks[id].push({ start, end, text });
    state.blanks[id].sort((a, b) => a.start - b.start);
    renderContent();
    toast(`빈칸 추가: "${truncate(text, 20)}"`);
    await syncBlanks(id);
  }

  async function removeBlank(idx) {
    const id = state.currentArticleId;
    if (!state.blanks[id]) return;
    const removed = state.blanks[id].splice(idx, 1)[0];
    if (state.blanks[id].length === 0) delete state.blanks[id];
    renderContent();
    if (removed) toast(`빈칸 삭제: "${truncate(removed.text, 20)}"`);
    await syncBlanks(id);
  }

  async function clearBlanks() {
    const id = state.currentArticleId;
    if (!state.blanks[id]) return;
    if (!confirm('이 조문의 모든 빈칸을 삭제할까요?')) return;
    delete state.blanks[id];
    renderContent();
    toast('빈칸을 모두 초기화했습니다');
    await syncBlanks(id);
  }

  // 디바운싱 없이 바로 저장 — 사용자는 원자적 액션(추가/삭제)마다 저장 기대
  async function syncBlanks(articleId) {
    const arr = state.blanks[articleId] || [];
    const result = await blanksAPI.save(articleId, arr);
    if (!result.success && state.isLoggedIn) {
      console.warn('DB 저장 실패:', result.error);
      toast('저장 실패 — 네트워크를 확인하세요');
    }
  }

  // === 모드 전환 ===
  function switchMode(mode) {
    const id = state.currentArticleId;
    const count = (state.blanks[id] || []).length;
    if (mode === 'study' && count === 0) {
      toast('먼저 편집 모드에서 빈칸을 만드세요');
      return;
    }
    state.mode = mode;
    renderContent();
  }

  function revealAll() {
    document.querySelectorAll('.blank-span.in-study').forEach(el => el.classList.add('revealed'));
  }
  function hideAll() {
    document.querySelectorAll('.blank-span.in-study').forEach(el => el.classList.remove('revealed'));
  }

  function renderSyncBanner(blankCount) {
    // 로그인 되어있으면 배너 없음
    if (state.isLoggedIn) return '';
    // 배너 닫은 적 있으면 숨김
    if (sessionStorage.getItem('sync_banner_dismissed') === '1') return '';
    // 빈칸이 하나라도 있어야 보여줌 (처음 방문자에게 과부하 안줌)
    if (blankCount === 0) return '';

    return `
      <div class="sync-banner">
        <div class="sync-banner-text">
          <svg class="sync-banner-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
            <path d="M3 3v5h5"/>
            <path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/>
            <path d="M16 16h5v5"/>
          </svg>
          <span>로그인하면 만든 빈칸을 <strong>모든 기기에서</strong> 동기화할 수 있어요.</span>
        </div>
        <a href="login.html" class="sync-banner-link">로그인 →</a>
        <button class="sync-banner-close" onclick="dismissSyncBanner()" aria-label="닫기">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    `;
  }

  function dismissSyncBanner() {
    sessionStorage.setItem('sync_banner_dismissed', '1');
    renderContent();
  }

  // === 유틸 ===
  function findArticle(id) {
    if (!id) return null;
    for (const slug of Object.keys(state.articles)) {
      const found = state.articles[slug].find(a => a.id === id);
      if (found) return found;
    }
    return null;
  }

  function loadBlanksFromStorage() { /* deprecated — initAuth에서 blanksAPI.getAll() 사용 */ }
  function saveBlanksToStorage() { /* deprecated — syncBlanks()로 대체 */ }

  function initLawTabs() {
    document.querySelectorAll('.law-tab').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.law-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        loadLaw(btn.dataset.law);
      };
    });
  }

  function initSearch() {
    const input = document.getElementById('searchInput');
    let timer;
    input.oninput = () => {
      clearTimeout(timer);
      timer = setTimeout(() => renderArticleList(input.value), 120);
    };
  }

  function escapeHtml(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }
  function truncate(s, n) {
    s = String(s);
    return s.length <= n ? s : s.slice(0, n) + '…';
  }
  function toast(msg) {
    const t = document.getElementById('toast');
    t.innerHTML = `<span>${escapeHtml(msg)}</span>`;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 1800);
  }

  // 전역 노출 (툴바 버튼 onclick용)
  window.clearBlanks = clearBlanks;
  window.switchMode = switchMode;
  window.revealAll = revealAll;
  window.hideAll = hideAll;
  window.dismissSyncBanner = dismissSyncBanner;
</script>

</body>
</html>
